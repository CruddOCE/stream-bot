<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Stream Bot Overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #alert-box {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-30px);
    opacity: 0;
    background: linear-gradient(135deg, #6441a5, #9146ff);
    color: #fff;
    padding: 18px 32px;
    border-radius: 14px;
    font-size: 28px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    text-align: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
    max-width: 80vw;
  }
  #alert-box.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #alert-kind {
    display: block;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
  <div id="alert-box">
    <span id="alert-kind"></span>
    <span id="alert-text"></span>
  </div>
  <script>
    const box = document.getElementById('alert-box');
    const kindEl = document.getElementById('alert-kind');
    const textEl = document.getElementById('alert-text');
    const queue = [];
    let showing = false;

    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start();
        osc.stop(ctx.currentTime + 0.6);
      } catch (e) {
        // Audio can fail to init before a user gesture in some contexts;
        // the visual alert still works fine without the chime.
      }
    }

    function processQueue() {
      if (showing || queue.length === 0) return;
      showing = true;
      const { type, message, displaySeconds } = queue.shift();
      kindEl.textContent = type || '';
      textEl.textContent = message;
      playChime();
      requestAnimationFrame(() => box.classList.add('show'));
      setTimeout(() => {
        box.classList.remove('show');
        setTimeout(() => {
          showing = false;
          processQueue();
        }, 450);
      }, (displaySeconds || 6) * 1000);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const utterance = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(utterance);
    }

    function connect() {
      const ws = new WebSocket(`ws://${location.host}`);
      ws.onmessage = (evt) => {
        let data;
        try {
          data = JSON.parse(evt.data);
        } catch (e) {
          return;
        }
        if (data.kind === 'alert') {
          queue.push(data);
          processQueue();
        } else if (data.kind === 'tts') {
          speak(data.text);
        }
      };
      ws.onclose = () => setTimeout(connect, 2000);
      ws.onerror = () => ws.close();
    }
    connect();
  </script>
</body>
</html>
