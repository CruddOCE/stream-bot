<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Stream Bot Overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #alert-box {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-30px);
    opacity: 0;
    background: linear-gradient(135deg, #6441a5, #9146ff);
    color: #fff;
    padding: 18px 32px;
    border-radius: 14px;
    font-size: 28px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    text-align: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
    max-width: 80vw;
  }
  #alert-box.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #alert-kind {
    display: block;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
  <div id="alert-box">
    <span id="alert-kind"></span>
    <span id="alert-text"></span>
  </div>
  <script>
    const box = document.getElementById('alert-box');
    const kindEl = document.getElementById('alert-kind');
    const textEl = document.getElementById('alert-text');
    const queue = [];
    let showing = false;

    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start();
        osc.stop(ctx.currentTime + 0.6);
      } catch (e) {
        // Audio can fail to init before a user gesture in some contexts;
        // the visual alert still works fine without the chime.
      }
    }

    function processQueue() {
      if (showing || queue.length === 0) return;
      showing = true;
      const { type, message, displaySeconds, silent } = queue.shift();
      kindEl.textContent = type || '';
      textEl.textContent = message;
      if (!silent) playChime();
      // Force a reflow before adding the class so the opacity/transform
      // transition actually animates instead of jumping straight to its
      // end state. requestAnimationFrame would normally do this, but it's
      // tied to the browser's paint cycle -- OBS's Browser Source uses
      // offscreen rendering, where rAF can be unreliable or never fire,
      // which left the box permanently invisible in practice.
      void box.offsetWidth;
      box.classList.add('show');
      setTimeout(() => {
        box.classList.remove('show');
        setTimeout(() => {
          showing = false;
          processQueue();
        }, 450);
      }, (displaySeconds || 10) * 1000);
    }

    // Some Chromium-based embedded browsers (including OBS's built-in
    // Browser Source) report speechSynthesis as available but load its
    // voice list asynchronously -- calling speak() before any voice has
    // loaded can fail silently. Wait for a voice, with a timeout fallback
    // in case 'voiceschanged' never fires at all (some embedded browsers
    // never populate a voice list, in which case this still won't
    // produce audio -- that's a real platform limitation, not something
    // fixable from here).
    function speak(text) {
      if (!('speechSynthesis' in window)) return;

      const trySpeak = () => {
        const voices = window.speechSynthesis.getVoices();
        const utterance = new SpeechSynthesisUtterance(text);
        if (voices.length > 0) utterance.voice = voices[0];
        window.speechSynthesis.speak(utterance);
      };

      if (window.speechSynthesis.getVoices().length > 0) {
        trySpeak();
        return;
      }

      let spoken = false;
      const onVoicesChanged = () => {
        if (spoken) return;
        spoken = true;
        window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
        trySpeak();
      };
      window.speechSynthesis.addEventListener('voiceschanged', onVoicesChanged);
      setTimeout(() => {
        if (spoken) return;
        spoken = true;
        window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
        trySpeak();
      }, 1000);
    }

    // Primary TTS path: play a server-rendered audio file (see
    // src/ttsEngine.js). Decoded and played through the same Web Audio API
    // (AudioContext) the chime already uses, rather than a plain <audio>
    // tag -- confirmed by testing that OBS's Browser Source plays the
    // AudioContext-based chime fine but was silently dropping <audio>
    // element playback, likely a separate/stricter autoplay policy for
    // HTMLMediaElement even where AudioContext is allowed.
    function playAudioUrl(url) {
      fetch(url)
        .then((res) => res.arrayBuffer())
        .then((buf) => {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          return ctx.decodeAudioData(buf).then((decoded) => {
            const source = ctx.createBufferSource();
            source.buffer = decoded;
            source.connect(ctx.destination);
            source.start();
          });
        })
        .catch((e) => {
          console.error('[overlay] TTS audio playback failed:', e);
        });
    }

    function connect() {
      const ws = new WebSocket(`ws://${location.host}`);
      ws.onmessage = (evt) => {
        let data;
        try {
          data = JSON.parse(evt.data);
        } catch (e) {
          return;
        }
        if (data.kind === 'alert') {
          queue.push(data);
          processQueue();
        } else if (data.kind === 'tts') {
          if (data.url) {
            playAudioUrl(data.url);
          } else if (data.text) {
            speak(data.text);
          }
        }
      };
      ws.onclose = () => setTimeout(connect, 2000);
      ws.onerror = () => ws.close();
    }
    connect();
  </script>
</body>
</html>
